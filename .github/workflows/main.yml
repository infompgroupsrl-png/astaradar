name: Esegui Astaradar

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Installa Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Installa dipendenze
        run: pip install requests pandas openpyxl

      - name: Esegui astaradar_run.py
        run: python astaradar_run.py
        env:
          PYTHONUNBUFFERED: "1"
- name: Installa Poppler (per pdf2image)
        run: sudo apt-get install -y poppler-utils

      - name: Installa dipendenze
        run: pip install requests pandas openpyxl pdf2image
